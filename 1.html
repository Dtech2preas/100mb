<!DOCTYPE html>
<html>
<head>
    <title>DTECH SVG Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .diagram-container { border: 2px solid #ccc; padding: 20px; background: #f9f9f9; }
    </style>
</head>
<body>

    <h1>Electric Circuit Diagram</h1>
    <div class="diagram-container">
        <svg width="300" height="150">
            <line x1="20" y1="75" x2="100" y2="75" stroke="black" stroke-width="4" />
            <line x1="200" y1="75" x2="280" y2="75" stroke="black" stroke-width="4" />
            
            <rect x="20" y="50" width="10" height="50" fill="#333" />
            <rect x="35" y="60" width="5" height="30" fill="#333" />
            
            <circle cx="100" cy="75" r="5" fill="black" />
            <line x1="100" y1="75" x2="130" y2="40" stroke="black" stroke-width="3" />
            <circle cx="130" cy="40" r="5" fill="black" />
            
            <circle cx="165" cy="75" r="20" fill="none" stroke="black" stroke-width="3" />
            <path d="M 155 65 L 175 85 M 175 65 L 155 85" stroke="black" stroke-width="2" />
        </svg>
    </div>
    
    <p>This is a crisp, scalable vector graphic. It never pixelates, no matter how much you zoom in.</p>
</body>
</html>
