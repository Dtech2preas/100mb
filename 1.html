<!DOCTYPE html>
<html>
<head>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .diagram { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* The "Live" Animation */
        .conveyor-belt { stroke-dasharray: 10; animation: move 2s linear infinite; }
        @keyframes move { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
        
        .product { animation: slide 4s linear infinite; }
        @keyframes slide { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(200px); } 
        }
    </style>
</head>
<body>

<div class="diagram">
    <svg width="400" height="200" viewBox="0 0 400 200">
        <rect x="50" y="100" width="300" height="20" fill="#333"/>
        <line x1="50" y1="110" x2="350" y2="110" stroke="#555" stroke-width="40" stroke-dasharray="10" class="conveyor-belt"/>
        
        <rect x="250" y="60" width="60" height="60" fill="#d97706" rx="5"/>
        <text x="260" y="95" font-family="sans-serif" font-size="12" fill="white">ASSEMBLY</text>
        
        <circle cx="70" cy="90" r="15" fill="#2563eb" class="product"/>
    </svg>
</div>

</body>
</html>
